name: Package VSIX

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute VSIX file name
        id: meta
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const manifest = require('./package.json');
          console.log(`vsix=${manifest.name}-${manifest.version}.vsix`);
          NODE

      - name: Package extension with vsce
        run: npx --yes @vscode/vsce package --out "${{ steps.meta.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: ${{ steps.meta.outputs.vsix }}
          if-no-files-found: error
