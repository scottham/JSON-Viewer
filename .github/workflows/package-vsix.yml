name: Package VSIX

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute VSIX file name
        id: meta
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const manifest = require('./package.json');
          console.log(`vsix=${manifest.name}-${manifest.version}.vsix`);
          console.log(`tag=v${manifest.version}`);
          NODE

      - name: Run tests
        run: npm test

      - name: Package extension with vsce
        run: npx --yes @vscode/vsce package --out "${{ steps.meta.outputs.vsix }}"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: ${{ steps.meta.outputs.vsix }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          vsix="${{ steps.meta.outputs.vsix }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping release creation."
            exit 0
          fi

          gh release create "$tag" "$vsix" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes "Packaged VSIX for $tag." \
            --latest
